<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0F0F0F">
<title>Thanks — Occupied.</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400&family=JetBrains+Mono:wght@400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0F0F0F;
    --off-white: #F5F2ED;
    --red: #E63946;
    --on-dark: #E8DCC8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Geist', -apple-system, sans-serif;
    background: var(--black);
    color: var(--off-white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 540px; text-align: center; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--red);
    margin-bottom: 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--red);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(48px, 12vw, 80px);
    line-height: 0.95;
    letter-spacing: -0.035em;
    margin-bottom: 24px;
  }
  h1 .stop { color: var(--red); font-weight: 400; }
  p {
    font-size: 17px;
    color: var(--on-dark);
    line-height: 1.55;
    margin-bottom: 36px;
  }
  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(245,242,237,0.5);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-top: 48px;
  }
  a {
    color: var(--off-white);
    border-bottom: 1px solid var(--red);
    text-decoration: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">
      <span class="dot"></span>
      MESSAGE RECEIVED
    </div>
    <h1>We'll be in touch<span class="stop">.</span></h1>
    <p>Thanks for reaching out. We'll review your listing and come back to you within 24 hours with your free performance audit.</p>
    <p style="font-size: 14px;">In the meantime, you can reach Rob directly at <a href="mailto:rob@occupied.co.za">rob@occupied.co.za</a></p>
    <div class="meta">
      <a href="/" style="color: rgba(245,242,237,0.6); border: none;">← Back to Occupied.</a>
    </div>
  </div>
</body>
</html>
